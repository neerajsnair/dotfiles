[Settings]
language = en
folder = ~/Pictures/Wallpapers
monitors = All
wallpaper = ~/Pictures/Wallpapers/aesthetic_deer.jpg
backend = swww
fill = fill
sort = name
color = #ffffff
subfolders = False
show_hidden = False
show_gifs_only = False
post_command = wal -i $wallpaper && pkill waybar && waybar
number_of_columns = 3
swww_transition_type = any
swww_transition_step = 10
swww_transition_angle = 0
swww_transition_duration = 0
swww_transition_fps = 60
use_xdg_state = False

